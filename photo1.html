<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2026년도 세부 문화탐방</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/css/lightgallery-bundle.min.css"/>

    <style>
        body{
            margin:0;
            background:#111;
        }


        #loading{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#111;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            z-index:9999;
            color:white;
            font-size:18px;
        }

        .spinner{
            width:50px;
            height:50px;
            border:5px solid #444;
            border-top:5px solid white;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:15px;
        }

        @keyframes spin{
            0%{transform:rotate(0deg);}
            100%{transform:rotate(360deg);}
        }

        .photo{
            display:none; /* 처음에는 숨김 */
        }



        .photo{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:10px;
            padding:20px;
        }
        .photo img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:6px;
            cursor:pointer;
            transition:0.2s;
        }
        .photo img:hover{
            transform:scale(1.05);
        }
    </style>

</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">사진을 불러오는 중...</div>
</div>

<div id="gallery" class="photo">



    <a href="./2026-sebu/DJI_20260227060328_0001_D.JPG"><img src="./2026-sebu/DJI_20260227060328_0001_D.JPG" loading="lazy"/></a>
    <a href="./2026-sebu/DJI_20260227060340_0001_D.JPG"><img src="./2026-sebu/DJI_20260227060340_0001_D.JPG" loading="lazy"/></a>
    <a href="./2026-sebu/DJI_20260227060809_0004_D.JPG"><img src="./2026-sebu/DJI_20260227060809_0004_D.JPG" loading="lazy"/></a>
    <a href="./2026-sebu/DJI_20260227060819_0005_D.JPG"><img src="./2026-sebu/DJI_20260227060819_0005_D.JPG" loading="lazy"/></a>
    <a href="./2026-sebu/DJI_20260227060820_0006_D.JPG"><img src="./2026-sebu/DJI_20260227060820_0006_D.JPG" loading="lazy"/></a>



    <!-- 이하 동일 패턴 -->
</div>


<script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/lightgallery.min.js"></script>
<script>
    const gallery = document.getElementById("gallery");
    const images = gallery.querySelectorAll("img");

    let loaded = 0;
    const showAfter = Math.max(5, images.length * 0.3);
    // 최소 5장 또는 전체의 30%

    images.forEach(img=>{
        const temp = new Image();
        temp.src = img.src;

        temp.onload = ()=>{
            loaded++;

            if(loaded >= showAfter){
                document.getElementById("loading").style.display="none";
                gallery.style.display="grid";
            }
        }
    });

    lightGallery(gallery,{
        speed:300,
        download:true,
        zoom:true
    });
</script>



</body>
</html>
